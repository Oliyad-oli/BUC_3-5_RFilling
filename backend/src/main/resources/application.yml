spring:
  application:
    name: tax-filing-core-server

  # Java 21 virtual threads (Project Loom) — Tomcat + @Async both use them.
  # Near-unlimited concurrency for I/O-bound engine-adapter and DB calls.
  threads:
    virtual:
      enabled: true

  jpa:
    hibernate:
      ddl-auto: validate         # Schema is owned by Flyway — Hibernate never changes it.
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true

  datasource:
    # stringtype=unspecified: lets the PG driver send JSON strings without a type
    # tag so PostgreSQL casts based on the target column type (jsonb).
    # Without this, JsonbConverter output is sent as varchar and PG refuses to cast.
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:tax_filing_db}?stringtype=unspecified
    username: ${DB_USER:root}
    password: ${DB_PASS:root@1234}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      pool-name: TaxFilingHikariPool

  flyway:
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: ${SERVER_PORT:8081}
  servlet:
    # Context path provides /api/v1 prefix.
    # Controllers do NOT repeat this prefix — avoids the double-prefix bug.
    context-path: /api/v1
  error:
    include-message: always
    include-binding-errors: always

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: tax-filing-core-server
    distribution:
      percentiles-histogram:
        http.server.requests: true
  tracing:
    sampling:
      probability: 1.0

logging:
  level:
    root: INFO
    com.itas.taxfiling: DEBUG
    org.springframework.web: INFO
    org.springframework.data: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %X{traceId} %X{correlationId} %X{actorId} - %msg%n"
    file:    "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %X{traceId} %X{correlationId} %X{actorId} - %msg%n"

# ── Resilience4j ──────────────────────────────────────────────────────────────
# All engine adapters share the same sliding-window / threshold / open-duration
# settings. Override per-instance only when you have a different SLA requirement.
resilience4j:
  circuitbreaker:
    configs:
      default:
        slidingWindowSize: 100
        failureRateThreshold: 50
        waitDurationInOpenState: 30000
        permittedNumberOfCallsInHalfOpenState: 10
    instances:
      ledger-engine:
        baseConfig: default
      rule-engine:
        baseConfig: default
      risk-engine:
        baseConfig: default
      e-invoice-engine:
        baseConfig: default
      tax-type-engine:
        baseConfig: default
      registration-service:
        baseConfig: default
      dms:
        baseConfig: default
      case-management:
        baseConfig: default
      notification-engine:
        baseConfig: default
      workflow-engine:
        baseConfig: default
      ministry-integration:
        baseConfig: default

  retry:
    configs:
      default:
        maxAttempts: 3
        waitDuration: 1000
        retryExceptions:
          - java.net.ConnectException
          - java.io.IOException
    instances:
      ledger-engine:
        baseConfig: default
      rule-engine:
        baseConfig: default
      risk-engine:
        baseConfig: default
      e-invoice-engine:
        baseConfig: default
      tax-type-engine:
        baseConfig: default
      registration-service:
        baseConfig: default
      dms:
        baseConfig: default
      case-management:
        baseConfig: default
      notification-engine:
        baseConfig: default
      workflow-engine:
        baseConfig: default
      ministry-integration:
        baseConfig: default

# ── Springdoc OpenAPI ─────────────────────────────────────────────────────────
springdoc:
  api-docs:
    path: /openapi
  swagger-ui:
    path: /swagger-ui.html
    use-root-path: true

# ── Outbox Dispatcher ─────────────────────────────────────────────────────────
itas:
  outbox:
    poll-interval-ms: 5000       # How often OutboxDispatcher.drain() runs
    batch-size: 50               # Rows claimed per poll tick
  scheduler:
    filing-period-status-cron: "0 0 1 * * *"     # Daily 01:00 — FUTURE→OPEN→DUE→OVERDUE
    open-filing-period-cron:   "0 5 0 1 * * *"   # Monthly 00:05 on 1st — opens next period
  tax-type-cache:
    refresh-interval-ms: 3600000  # Hourly refresh of near-expiring rule-package-cache rows

# ── External Integration Base URLs ───────────────────────────────────────────
integrations:
  ledger:
    base-url: ${LEDGER_BASE_URL:http://172.16.0.92:32703}
    connect-timeout-ms: 5000
    read-timeout-ms: 15000
