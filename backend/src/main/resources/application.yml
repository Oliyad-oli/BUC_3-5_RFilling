spring:
  application:
    name: taxfiling-core
  
  # H2 in-memory for development
  datasource:
    url: jdbc:h2:mem:taxfiling;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver
  
  h2:
    console:
      enabled: true
      path: /h2-console
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
  
  flyway:
    enabled: false  # Disabled for H2 dev mode; JPA auto-generates schema
  
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      group-id: taxfiling-core
      properties:
        spring.json.trusted.packages: "*"
    # Disable auto-start when Kafka is not available
    listener:
      auto-startup: false

server:
  port: 8080

logging:
  level:
    root: INFO
    com.itas.taxfiling: DEBUG
    org.hibernate.SQL: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

# OpenAPI/Swagger Configuration
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha

# Application-specific configuration
taxfiling:
  outbox:
    dispatcher:
      enabled: true
      fixed-delay: 5000
      batch-size: 100
  
  engine-adapters:
    mode: mock
    
  idempotency:
    ttl-hours: 24
